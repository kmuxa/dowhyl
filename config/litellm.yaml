# ============================================================================
#  LiteLLM gateway — tiered aliases + fallback + cooldown + cache + $ cap.
#  Every lane mixes >=5 providers (max 5 models per provider per lane),
#  ordered best-first. Lanes whose API key is blank in .env are simply
#  skipped; fallback chains route around them.
#
#  SIZE GUARDS (the Groq/Cerebras 400/413 fix): free tiers there have tiny
#  per-minute token budgets, so each deployment declares its real budget via
#  tpm + model_info.max_input_tokens. With enable_pre_call_checks, the router
#  skips them for oversized turns BEFORE calling — no failed calls, no stalls.
#  Check each provider's limits page for YOUR account's numbers and adjust.
#
#  PRIVACY: [trains] = provider may train on inputs (xai data-share, gemini
#  free, some openrouter :free hosts) — keep sensitive repos on NVIDIA/paid.
#
#  After edits:  ./bin/refresh-models  (add --fix to auto-correct ids), then
#  docker compose restart litellm.   OpenRouter ids are validated key-free;
#  sambanova/cloudflare/xai show "?" until keys are added.
# ============================================================================

model_list:
  # ---- frontier: the brutal ~5% (paid on top, capped; free tail = resilience) ----
  - {model_name: frontier, litellm_params: {model: anthropic/claude-opus-4-8, api_key: os.environ/ANTHROPIC_API_KEY}}
  - {model_name: frontier, litellm_params: {model: openai/gpt-5.5,            api_key: os.environ/OPENAI_API_KEY}}
  - {model_name: frontier, litellm_params: {model: anthropic/claude-sonnet-5, api_key: os.environ/ANTHROPIC_API_KEY}}
  - {model_name: frontier, litellm_params: {model: xai/grok-4,                api_key: os.environ/XAI_API_KEY}}   # $25 signup credits; +$150/mo with data-share opt-in [trains]
  - {model_name: frontier, litellm_params: {model: openrouter/qwen/qwen3-coder:free, api_key: os.environ/OPENROUTER_API_KEY}}
  - {model_name: frontier, litellm_params: {model: nvidia_nim/z-ai/glm-5.2,         api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: frontier, litellm_params: {model: nvidia_nim/moonshotai/kimi-k2.6, api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}

  # ---- smart: real coding (planning, hard debugging) ----
  - {model_name: smart, litellm_params: {model: anthropic/claude-sonnet-5,              api_key: os.environ/ANTHROPIC_API_KEY}}
  - {model_name: smart, litellm_params: {model: nvidia_nim/z-ai/glm-5.2,                api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: smart, litellm_params: {model: nvidia_nim/moonshotai/kimi-k2.6,        api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: smart, litellm_params: {model: openrouter/qwen/qwen3-coder:free,       api_key: os.environ/OPENROUTER_API_KEY}}   # strongest free coder, big ctx
  - {model_name: smart, litellm_params: {model: nvidia_nim/deepseek-ai/deepseek-v4-pro, api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: smart, litellm_params: {model: xai/grok-4,                             api_key: os.environ/XAI_API_KEY}}
  - {model_name: smart, litellm_params: {model: nvidia_nim/qwen/qwen3.5-397b-a17b,      api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: smart, litellm_params: {model: nvidia_nim/minimaxai/minimax-m3,        api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: smart, litellm_params: {model: sambanova/DeepSeek-V3.2,                api_key: os.environ/SAMBANOVA_API_KEY}}    # prior-gen reasoner, RDU-fast (skip V3.1: superseded)
  - {model_name: smart, litellm_params: {model: deepseek/deepseek-v4-pro,               api_key: os.environ/DEEPSEEK_API_KEY}}     # cheapest strong paid

  # ---- mid: routine implementation (the workhorse) ----
  - {model_name: mid, litellm_params: {model: nvidia_nim/deepseek-ai/deepseek-v4-flash, api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: mid, litellm_params: {model: openrouter/qwen/qwen3-coder:free,         api_key: os.environ/OPENROUTER_API_KEY}}   # heavy turns, free, big ctx
  - {model_name: mid, litellm_params: {model: gemini/gemini-3.5-flash,                  api_key: os.environ/GEMINI_API_KEY}}       # ~1500 req/day, fast [trains]
  - {model_name: mid, litellm_params: {model: sambanova/gpt-oss-120b,                   api_key: os.environ/SAMBANOVA_API_KEY}}    # 3rd home for gpt-oss (tri-homed w/ cerebras+groq); takes full-size turns
  # size-guarded fast small-turn lanes (the fix): adjust to YOUR published limits
  - {model_name: mid, litellm_params: {model: cerebras/gpt-oss-120b,    api_key: os.environ/CEREBRAS_API_KEY, rpm: 5,  tpm: 30000, drop_params: true}, model_info: {max_input_tokens: 24000}}
  - {model_name: mid, litellm_params: {model: groq/openai/gpt-oss-120b, api_key: os.environ/GROQ_API_KEY,     rpm: 30, tpm: 6000,  drop_params: true}, model_info: {max_input_tokens: 5000}}
  - {model_name: mid, litellm_params: {model: sambanova/MiniMax-M2.7,                          api_key: os.environ/SAMBANOVA_API_KEY}}   # same weights as NVIDIA line below — dual-homed, RDU-fast
  - {model_name: mid, litellm_params: {model: nvidia_nim/minimaxai/minimax-m2.7,               api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: mid, litellm_params: {model: nvidia_nim/qwen/qwen3-next-80b-a3b-instruct,     api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: mid, litellm_params: {model: openrouter/openai/gpt-oss-120b:free,             api_key: os.environ/OPENROUTER_API_KEY}}
  - {model_name: mid, litellm_params: {model: nvidia_nim/nvidia/llama-3.3-nemotron-super-49b-v1.5, api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}

  # ---- long: huge-context reads (NOT for secrets) ----
  - {model_name: long, litellm_params: {model: gemini/gemini-3.5-flash,           api_key: os.environ/GEMINI_API_KEY}}          # 1M ctx [trains]
  - {model_name: long, litellm_params: {model: openrouter/qwen/qwen3-coder:free,  api_key: os.environ/OPENROUTER_API_KEY}}      # 1M ctx free
  - {model_name: long, litellm_params: {model: nvidia_nim/moonshotai/kimi-k2.6,   api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: long, litellm_params: {model: xai/grok-4.1-fast,                 api_key: os.environ/XAI_API_KEY}}             # 2M ctx [trains w/ credits opt-in]
  - {model_name: long, litellm_params: {model: nvidia_nim/z-ai/glm-5.2,           api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: long, litellm_params: {model: nvidia_nim/qwen/qwen3.5-397b-a17b, api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: long, litellm_params: {model: nvidia_nim/minimaxai/minimax-m3,   api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: long, litellm_params: {model: deepseek/deepseek-v4-flash,        api_key: os.environ/DEEPSEEK_API_KEY}}        # paid-cheap tail

  # ---- cheap: commits, summaries, classification (fast + high-volume) ----
  - {model_name: cheap, litellm_params: {model: gemini/gemini-3.1-flash-lite, api_key: os.environ/GEMINI_API_KEY}}
  - {model_name: cheap, litellm_params: {model: groq/openai/gpt-oss-20b, api_key: os.environ/GROQ_API_KEY, tpm: 6000, drop_params: true}, model_info: {max_input_tokens: 5000}}
  - {model_name: cheap, litellm_params: {model: nvidia_nim/openai/gpt-oss-20b,                 api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: cheap, litellm_params: {model: cloudflare/@cf/meta/llama-3.3-70b-instruct-fp8-fast, api_key: os.environ/CLOUDFLARE_API_KEY}}   # 10k neurons/day; needs CLOUDFLARE_ACCOUNT_ID
  - {model_name: cheap, litellm_params: {model: openrouter/meta-llama/llama-3.3-70b-instruct:free,   api_key: os.environ/OPENROUTER_API_KEY}}
  - {model_name: cheap, litellm_params: {model: sambanova/Meta-Llama-3.3-70B-Instruct,         api_key: os.environ/SAMBANOVA_API_KEY}}   # tri-homed llama-3.3-70b (OR + CF + SN), RDU-fast
  - {model_name: cheap, litellm_params: {model: nvidia_nim/nvidia/nemotron-3-nano-30b-a3b,     api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}
  - {model_name: cheap, litellm_params: {model: nvidia_nim/mistralai/ministral-14b-instruct-2512, api_key: os.environ/NVIDIA_API_KEY, drop_params: true}}

  # ---- overflow: cheapest paid, tried before frontier (deliberately minimal) ----
  - {model_name: overflow, litellm_params: {model: deepseek/deepseek-v4-flash, api_key: os.environ/DEEPSEEK_API_KEY}}

router_settings:
  routing_strategy: latency-based-routing
  allowed_fails: 2
  cooldown_time: 60
  enable_pre_call_checks: true     # enforces model_info.max_input_tokens + tpm/rpm BEFORE calling
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  fallbacks:
    - {frontier: [smart]}
    - {smart:    [mid, overflow]}
    - {mid:      [long, cheap, overflow]}
    - {long:     [mid]}

litellm_settings:
  num_retries: 2
  request_timeout: 120
  turn_off_message_logging: true
  cache: true
  cache_params: {type: redis, host: os.environ/REDIS_HOST, port: os.environ/REDIS_PORT, ttl: 3600}
  # callbacks: ["langfuse"]

guardrails:
  - guardrail_name: "secret-scan"
    litellm_params:
      guardrail: guardrails.secret_scan.SecretScanGuardrail
      mode: "pre_call"
      default_on: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  fail_closed_budget_enforcement: true
