# Postgres (virtual keys + budgets) + Redis (cache/cooldown) + LiteLLM gateway.
# Start with:  docker compose up -d   (setup.sh does this for you)
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
      POSTGRES_DB: litellm
    volumes: ["litellm-pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  litellm:
    # Pin >= 1.84.0 (the March-2026 1.82.7/1.82.8 builds had a supply-chain issue).
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    env_file: .env
    ports: ["4000:4000"]
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
      - ./guardrails:/app/guardrails:ro      # custom secret-scan guardrail
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health/liveliness"]
      interval: 10s
      timeout: 5s
      retries: 15

volumes:
  litellm-pgdata:
